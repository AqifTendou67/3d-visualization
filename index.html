<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Data Visualization Assignment</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        #auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 10;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .auth-card h1 { font-size: 24px; margin-bottom: 10px; color: #333; }
        .auth-card p { font-size: 14px; color: #666; margin-bottom: 30px; }

        #app-container {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .element {
            width: 120px;
            height: 160px;
            box-shadow: 0px 0px 12px rgba(0,255,255,0.5);
            border: 1px solid rgba(127,255,255,0.25);
            text-align: center;
            cursor: default;
            transition: box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            border-radius: 6px;
        }
        .element:hover {
            box-shadow: 0px 0px 12px rgba(0,255,255,0.75);
            border: 1px solid rgba(127,255,255,0.75);
        }
        .element img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            object-fit: cover;
            margin-top: 8px;
            background-color: #555;
        }
        .element .name {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            padding: 0 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 90%;
        }
        .element .role {
            font-size: 9px;
            color: rgba(255,255,255,0.75);
            margin-bottom: 8px;
        }

        #menu {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 5;
        }
        button {
            color: rgba(127,255,255,0.75);
            background: transparent;
            outline: 1px solid rgba(127,255,255,0.75);
            border: 0px;
            padding: 8px 15px;
            cursor: pointer;
            margin: 0 5px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: rgba(0,255,255,0.2);
            color: #fff;
        }
    </style>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Three.js Visual Engine Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <!-- First Screen -->
    <div id="auth-container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p>Sign in to explore the dataset visualization.</p>
            <div id="g_id_onload"
                 data-client_id="417538978541-05gf91muf6le644dijesih6b6pdcgou3.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <!-- Visualization Display Viewport -->
    <div id="app-container">
        <div id="container"></div>
        <div id="menu">
            <button id="table">TABLE</button>
            <button id="sphere">SPHERE</button>
            <button id="helix">HELIX</button>
            <button id="grid">GRID</button>
            <button id="pyramid">PYRAMID</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1-BHzAxpwBBI57sb6Fu-yYs2FGTFkoakwFm5Sbbbrdps';
        const API_KEY = 'AIzaSyBpfaROLxz_0UqYzFRasv6naOZLPZTglk4'; 
        let sheetData = [];

        let camera, scene, renderer, controls;
        const objects = [];
        const targets = { table: [], sphere: [], helix: [], grid: [], pyramid: [] };

        function handleCredentialResponse(response) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            fetchSheetData();
        }

        async function fetchSheetData() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Network response was not ok");
                
                const csvText = await res.text();
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
                
                if (lines.length <= 1) {
                    throw new Error("No data rows found below the headers.");
                }

                function parseCSVRow(text) {
                    let matches = text.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || text.split(',');
                    return matches.map(val => val.replace(/^"|"$/g, '').trim());
                }

                const dataRows = lines.slice(1);
                
                sheetData = dataRows.map((line, idx) => {
                    const columns = parseCSVRow(line);
                    
                    const nameVal   = columns[0] ? columns[0].trim() : 'Unknown User';
                    const avatarVal = columns[1] ? columns[1].trim() : '';
                    const roleVal   = columns[4] ? columns[4].trim() : 'General'; 
                    const cashVal   = columns[5] ? columns[5].trim() : '0';          

                    let cleanText = cashVal.replace(/[\$, ]/g, '').toLowerCase();
                    let finalNetworth = 0;

                    if (cleanText.includes('k')) {
                        finalNetworth = parseFloat(cleanText.replace('k', '')) * 1000;
                    } else if (cleanText.includes('m')) {
                        finalNetworth = parseFloat(cleanText.replace('m', '')) * 1000000;
                    } else {
                        finalNetworth = parseFloat(cleanText) || 0;
                    }

                    return {
                        id: idx + 1,
                        avatar: avatarVal.startsWith('http') ? avatarVal : `https://ui-avatars.com/api/?name=${encodeURIComponent(nameVal)}&background=87CEEB&color=fff`,
                        name: nameVal,
                        role: roleVal,
                        networth: finalNetworth
                    };
                });

                sheetData = sheetData.slice(0, 200);
                
                init();
                animate();
            } catch (err) {
                console.error("CSV Fetch/Parse Failure: ", err);
                alert("Failed to grab sheet data. Confirm your Google Sheet is set to 'Anyone with the link can view'.");
            }
        }

        function getBackgroundColor(val) {
             if (val <= 100000) return 'rgba(239, 48, 34, 0.65)'; // Red (<=$100K)
             if (val >= 200000) return 'rgba(58, 180, 72, 0.65)'; // Green (>= $200K)
             return 'rgba(242, 142, 43, 0.65)'; // Orange (Strictly between $100K and $200K)
        }

        function init() {
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 3200;

            scene = new THREE.Scene();

            sheetData.forEach((data) => {
                const element = document.createElement('div');
                element.className = 'element';
                const color = getBackgroundColor(data.networth);
                element.style.backgroundColor = color;
                element.style.border = `1px solid ${color.replace('0.65', '0.95')}`;

                const img = document.createElement('img');
                img.src = data.avatar;
                
                img.onerror = function() {
                    this.onerror = null;
                    this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=333333&color=ffffff&size=65`;
                };
                
                element.appendChild(img);

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = data.name;
                element.appendChild(name);

                const role = document.createElement('div');
                role.className = 'role';
                role.textContent = data.role;
                element.appendChild(role);

                const objectCSS = new THREE.CSS3DObject(element);
                objectCSS.position.x = Math.random() * 4000 - 2000;
                objectCSS.position.y = Math.random() * 4000 - 2000;
                objectCSS.position.z = Math.random() * 4000 - 2000;
                scene.add(objectCSS);
                objects.push(objectCSS);
            });

            const vector = new THREE.Vector3();

            // 1. Layout: Table Coordinates
            const tableCols = 20; 
            objects.forEach((obj, i) => {
                const col = i % tableCols;
                const row = Math.floor(i / tableCols);
                const target = new THREE.Object3D();
                target.position.x = (col * 160) - 1520;
                target.position.y = - (row * 200) + 900;
                target.position.z = 0;
                targets.table.push(target);
            });

            // 2. Layout: Sphere Coordinates
            objects.forEach((obj, i) => {
                const phi = Math.acos(-1 + (2 * i) / objects.length);
                const theta = Math.sqrt(objects.length * Math.PI) * phi;
                const target = new THREE.Object3D();
                target.position.setFromSphericalCoords(850, phi, theta);
                vector.copy(target.position).multiplyScalar(2);
                target.lookAt(vector);
                targets.sphere.push(target);
            });

            // 3. Layout: Helix Coordinates
            objects.forEach((obj, i) => {
                const target = new THREE.Object3D();
                const strand = i % 2; 
                const theta = (i * 0.16) + (strand * Math.PI); 
                const y = - (i * 9) + 800;
                target.position.setFromCylindricalCoords(950, theta, y);
                vector.x = target.position.x * 2;
                vector.y = target.position.y;
                vector.z = target.position.z * 2;
                target.lookAt(vector);
                targets.helix.push(target);
            });

            // 4. Layout: Grid Dimensions
            const gridX = 5;
            const gridY = 4;
            objects.forEach((obj, i) => {
                const target = new THREE.Object3D();
                const x = i % gridX;
                const y = Math.floor((i % (gridX * gridY)) / gridX);
                const z = Math.floor(i / (gridX * gridY));
                
                target.position.x = (x * 380) - 760;
                target.position.y = - (y * 420) + 630;
                target.position.z = - (z * 800) + 2000;
                targets.grid.push(target);
            });

            // 5. Layout: Pyramid (Tetrahedron) Coordinates
            const pyramidVertices = [
                new THREE.Vector3(0, 1500, 0),                        // Top
                new THREE.Vector3(0, -750, 1600),                     // Front Bottom
                new THREE.Vector3(1385, -750, -800),                  // Right Back
                new THREE.Vector3(-1385, -750, -800)                  // Left Back
            ];

            const pyramidFaces = [
                [pyramidVertices[0], pyramidVertices[1], pyramidVertices[2]], // Front-Right Face
                [pyramidVertices[0], pyramidVertices[2], pyramidVertices[3]], // Back Face
                [pyramidVertices[0], pyramidVertices[3], pyramidVertices[1]], // Front-Left Face
                [pyramidVertices[1], pyramidVertices[3], pyramidVertices[2]]  // Base Face
            ];

            const itemsPerFace = Math.ceil(objects.length / 4);
            let maxRows = 1;
            while ((maxRows * (maxRows + 1)) / 2 < itemsPerFace) {
                maxRows++;
            }

            objects.forEach((obj, i) => {
                const faceIdx = i % 4;
                const faceItemIdx = Math.floor(i / 4);

                let row = 0;
                let count = 0;
                while (count + (row + 1) <= faceItemIdx) {
                    count += row + 1;
                    row++;
                }
                const col = faceItemIdx - count;

                const u = 1 - (row / Math.max(1, maxRows - 1));
                const v = (row - col) / Math.max(1, maxRows - 1);
                const w = col / Math.max(1, maxRows - 1);

                const face = pyramidFaces[faceIdx];
                const target = new THREE.Object3D();
                
                target.position.x = u * face[0].x + v * face[1].x + w * face[2].x;
                target.position.y = u * face[0].y + v * face[1].y + w * face[2].y;
                target.position.z = u * face[0].z + v * face[1].z + w * face[2].z;

                // Compute normal vector to make elements face outward
                const edge1 = new THREE.Vector3().subVectors(face[1], face[0]);
                const edge2 = new THREE.Vector3().subVectors(face[2], face[0]);
                const normal = new THREE.Vector3().crossVectors(edge1, edge2).normalize();
                
                vector.copy(target.position).add(normal.multiplyScalar(1000));
                target.lookAt(vector);

                targets.pyramid.push(target);
            });

            renderer = new THREE.CSS3DRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.TrackballControls(camera, renderer.domElement);
            controls.minDistance = 500;
            controls.maxDistance = 6500;
            controls.addEventListener('change', render);

            setupTransformButton('table', targets.table, 2000);
            setupTransformButton('sphere', targets.sphere, 2000);
            setupTransformButton('helix', targets.helix, 2000);
            setupTransformButton('grid', targets.grid, 2000);
            setupTransformButton('pyramid', targets.pyramid, 2000);

            transform(targets.table, 2000);
            window.addEventListener('resize', onWindowResize);
        }

        function setupTransformButton(id, targetLayout, duration) {
            document.getElementById(id).addEventListener('click', () => transform(targetLayout, duration));
        }

        function transform(targetLayout, duration) {
            TWEEN.removeAll();
            objects.forEach((obj, i) => {
                const target = targetLayout[i];
                if (!target) return;

                new TWEEN.Tween(obj.position)
                    .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration / 2)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();

                new TWEEN.Tween(obj.rotation)
                    .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration / 2)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();
            });

            new TWEEN.Tween(this)
                .to({}, duration * 2)
                .onUpdate(render)
                .start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
